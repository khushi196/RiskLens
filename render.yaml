services:
  - type: web
    name: risklens-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: AI_FALLBACK_TO_MOCK
        value: true
      - key: ALLOWED_ORIGINS
        value: '*'
      - key: GEMINI_API_KEY
        sync: false


